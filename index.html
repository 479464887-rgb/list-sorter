<!DOCTYPE html><html lang="en"><head>
<meta property="og:title" content="List Sorter — DevKit">
<meta property="og:description" content="Free online List Sorter tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/list-sorter/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/list-sorter/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Sort, deduplicate, and organize lists"><title>List Sorter — DevKit Tools</title><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--radius:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;}
.header a{color:var(--text);text-decoration:none;font-size:13px;}
.container{max-width:700px;margin:0 auto;padding:32px 24px;flex:1;width:100%;}
h1{font-size:24px;color:#f0f6fc;margin-bottom:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;color:var(--text);font-size:13px;font-family:monospace;resize:vertical;}
textarea:focus{outline:none;border-color:var(--accent);}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.btn{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;font-size:12px;cursor:pointer;}
.btn:hover{background:#30363d;}
.btn.accent{background:#238636;color:#fff;border-color:#238636;}
.stats{font-size:12px;color:var(--text2);margin-top:8px;}
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}</style></head><body>
<div class="header"><a href="https://devkit-tools.xyz">← DevKit</a><span style="color:var(--text2);font-size:13px;">List Sorter</span></div>
<div class="container"><h1>📋 List Sorter</h1>
<div class="card"><label>Input (one item per line)</label>
<textarea id="input" rows="10" placeholder="apple&#10;banana&#10;cherry&#10;apple&#10;date&#10;banana">apple
banana
cherry
apple
date
banana</textarea>
<div class="btn-row">
<button class="btn accent" onclick="sort('az')">A→Z</button><button class="btn" onclick="sort('za')">Z→A</button>
<button class="btn" onclick="sort('num')">0→9</button><button class="btn" onclick="sort('rnum')">9→0</button>
<button class="btn" onclick="sort('len')">Length</button><button class="btn" onclick="sort('random')">Random</button>
<button class="btn" onclick="sort('reverse')">Reverse</button><button class="btn accent" onclick="dedup()">Remove Dups</button>
<button class="btn" onclick="document.getElementById('input').value='';document.getElementById('stats').textContent=''">Clear</button>
</div>
<div class="stats" id="stats"></div>
</div></div>
<script>
'use strict';
function sort(mode){
  let lines=document.getElementById('input').value.split('\n').filter(l=>l.trim());
  if(mode==='az') lines.sort();
  else if(mode==='za') lines.sort().reverse();
  else if(mode==='num') lines.sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  else if(mode==='rnum') lines.sort((a,b)=>b.localeCompare(a,undefined,{numeric:true}));
  else if(mode==='len') lines.sort((a,b)=>a.length-b.length);
  else if(mode==='random') lines.sort(()=>Math.random()-0.5);
  else if(mode==='reverse') lines.reverse();
  document.getElementById('input').value=lines.join('\n');
  updateStats();
}
function dedup(){let lines=[...new Set(document.getElementById('input').value.split('\n').filter(l=>l.trim()))];document.getElementById('input').value=lines.join('\n');updateStats();}
function updateStats(){const lines=document.getElementById('input').value.split('\n').filter(l=>l.trim());document.getElementById('stats').textContent=`${lines.length} items`}
updateStats();
</script></body></html>
